<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReentryIQ — Dashboard</title>
<link rel="canonical" href="https://reentryiq.com/dashboard" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="reentryiq/po-tokens.css" />
<link rel="stylesheet" href="reentryiq/po-responsive.css" />
<style>
  #root { min-height: 100vh; }
  #po-boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--po-bg); z-index: 999; transition: opacity .3s; }
  #po-boot.hide { opacity: 0; pointer-events: none; }
  input::placeholder { color: var(--po-text-3); }
</style>
</head>
<body>
<div id="root"></div>
<div id="po-boot">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke="#4A90E2" stroke-width="1.9"/><path d="M8 14.5l2.5-3 2 2.2L16 9" stroke="#4A90E2" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
</div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="18" fill="#0F172A"/><rect x="30" y="30" width="40" height="40" rx="11" fill="none" stroke="#4A90E2" stroke-width="4"/><path d="M40 53l6-7 5 5.5L60 41" fill="none" stroke="#4A90E2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="reentryiq/po-data.jsx"></script>
<script type="text/babel" src="reentryiq/po-icons.jsx"></script>
<script type="text/babel" src="reentryiq/po-shell.jsx"></script>
<script type="text/babel" src="reentryiq/po-charts.jsx"></script>
<script type="text/babel" src="reentryiq/po-overview.jsx"></script>
<script type="text/babel" data-presets="env,react">
  (function(){ var n=0, t=setInterval(function(){ var b=document.getElementById('po-boot'); if(document.querySelector('#root>div')||n++>40){ if(b){b.classList.add('hide');setTimeout(function(){b.remove();},350);} clearInterval(t);} }, 80); })();
</script>
</body>
</html>
